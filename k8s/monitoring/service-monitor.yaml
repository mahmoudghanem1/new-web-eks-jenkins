apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: new-web-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: new-web
  namespaceSelector:
    matchNames:
      - default
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 15s